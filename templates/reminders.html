{% extends "layout.html" %}

{% block content %}

<h2>Reminders</h2>

<div class="card p-3 shadow">

<table class="table">

<tr>
    <th>Name</th>
    <th>Mobile</th>
    <th>Next Visit</th>
</tr>

{% for p in patients %}
<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.mobile }}</td>
    <td>{{ p.next_visit }}</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
