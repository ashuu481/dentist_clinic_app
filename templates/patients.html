{% extends "layout.html" %}

{% block content %}

<h2 class="mb-3">Patients</h2>

<div class="card p-3 mb-4 shadow">

    <form method="POST" class="row g-2">

        <div class="col-md-3">
            <input class="form-control" name="name" placeholder="Name" required>
        </div>

        <div class="col-md-2">
            <input class="form-control" name="age" placeholder="Age" required>
        </div>

        <div class="col-md-2">
            <input class="form-control" name="gender" placeholder="Gender" required>
        </div>

        <div class="col-md-3">
            <input class="form-control" name="mobile" placeholder="Mobile" required>
        </div>

        <div class="col-md-2">
            <button class="btn btn-success w-100">Add</button>
        </div>

        <div class="col-12">
            <input class="form-control mt-2" name="complaint" placeholder="Complaint">
        </div>

    </form>

</div>

<!-- TABLE -->
<div class="card p-3 shadow">

<table class="table table-striped">

    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Age</th>
        <th>Gender</th>
        <th>Mobile</th>
        <th>Complaint</th>
        <th>Action</th>
    </tr>

    {% for p in patients %}
    <tr>
        <td>{{ p.id }}</td>
        <td>{{ p.name }}</td>
        <td>{{ p.age }}</td>
        <td>{{ p.gender }}</td>
        <td>{{ p.mobile }}</td>
        <td>{{ p.complaint }}</td>
        <td>
            <a class="btn btn-sm btn-primary" href="/treatment/{{ p.id }}">Treat</a>
        </td>
    </tr>
    {% endfor %}

</table>

</div>

{% endblock %}
